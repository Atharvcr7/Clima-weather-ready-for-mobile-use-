<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clima</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
  </head>
  <body>
      <div id="card" class="morning">
        
        <div class="search-container">
            <button id="theme" onclick="themecha()"></button>
            <input type="text" id="search-bar" placeholder="Search for cities" class="search-input" onfocus="this.value=''"/>
            <button class="search-button"><i id="search-button" class="fa-solid fa-magnifying-glass"></i></button>
        </div>
    
        <div id="weatherrepo">
            <h4 id="area"></h4>
            <span id="weather_icon"></span>
            <h1 id="weatemp"></h1>
            <h2 id="weath"></h2>
            <h3 id="date"></h3>
            <hr style="border: 3px solid rgba(37, 128, 184, 0.78); width: 75vw; border-radius: 5px;">
            <div class="flex" style="padding: 10px 25px;">
              
              <div class="subcat">
                <i class="fa-solid fa-droplet"></i>
                <h4 id="humidity" style="margin: 10px 0px;"></h4>
                <h5 style="color: #ffffff83; margin: 0%;">Humidity</h5>
              </div>

              <div class="subcat">
                <i class="fa-solid fa-wind"></i>
                <h4 id="Wind" style="margin: 10px 0px;"></h4>
                <h5 style="color: #ffffff83; margin: 0%;">Wind Speed</h5>
              </div>

              <div class="subcat">
                <i class="fa-solid fa-temperature-high"></i>
                <h4 id="feel" style="margin: 10px 0px;"></h4>
                <h5 style="color: #ffffff83;  margin: 0%;">Feels like</h5>
              </div>
            </div>
          </div>
      </div>
        
      <div class="other">
            <div class="subcat">
              <i class="fa-solid fa-cloud-rain"></i>
              <h4 id="precip" style="margin: 7px 0px;"></h4>
              <h5 style="margin: 0%;">Drizzle</h5>
            </div>
            
            <div class="subcat">
              <i class="fa-solid fa-smog"></i>
              <h4 id="visib" style="margin: 7px 0px;"></h4>
              <h5 style="margin: 0%;">Visibility</h5>
            </div>
            <div class="subcat">
              <i class="fa-solid fa-compass"></i>
              <h4 id="winnddir" style="margin: 7px 0px;"></h4>
              <h5 style="margin: 0%;">Windward</h5>
            </div>
      </div>
    
  <script src="app.js"></script>
  </body>
</html>
